name: validate-skills

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      SKILLS_SKIP_SUBMODULE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install --no-audit --no-fund
      - name: Validate frontmatter & relative links
        run: npm run validate
      - name: MCP smoke (tools/list against http://mcp.bmobapp.com/mcp)
        run: npx tsx tests/mcp-smoke.test.ts
        continue-on-error: true
